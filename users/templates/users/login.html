{% extends 'users/base.html' %}

{% block title %}Sign In - Smart Clinic{% endblock %}

{% block content %}
<div class="glass-panel">
    <div style="text-align: center; margin-bottom: 2rem;">
        <h2 style="font-size: 2rem; margin-bottom: 0.5rem;">Welcome Back</h2>
        <p style="color: #94A3B8;">Sign in to access your appointments.</p>
    </div>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        
        <button type="submit" class="btn" style="margin-top: 1rem; width: 100%;">Sign In</button>
    </form>
    
    <p style="text-align: center; margin-top: 2rem; color: #94A3B8; font-size: 0.9rem;">
        Don't have an account? <a href="{% url 'register' %}" style="color: var(--primary); text-decoration: none; font-weight: 600;">Create Account</a>
    </p>
</div>
{% endblock %}
