{% extends 'users/base.html' %}

{% block title %}Create Account - Smart Clinic{% endblock %}

{% block content %}
<div class="glass-panel">
    <div style="text-align: center; margin-bottom: 2rem;">
        <h2 style="font-size: 2rem; margin-bottom: 0.5rem;">Create an Account</h2>
        <p style="color: #94A3B8;">Join Smart Clinic and manage your health.</p>
    </div>

    <form method="post">
        {% csrf_token %}
        <div style="max-height: 400px; overflow-y: auto; padding-right: 10px;">
            {{ form.as_p }}
        </div>
        
        <button type="submit" class="btn" style="margin-top: 1.5rem; width: 100%;">Register</button>
    </form>
    
    <p style="text-align: center; margin-top: 2rem; color: #94A3B8; font-size: 0.9rem;">
        Already have an account? <a href="{% url 'login' %}" style="color: var(--primary); text-decoration: none; font-weight: 600;">Sign In</a>
    </p>
</div>

<style>
    /* Custom scrollbar for the form */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,0.1); border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.3); }

    .doctor-fields {
        display: none;
        padding-top: 1rem;
        margin-top: 1rem;
        border-top: 1px solid rgba(255,255,255,0.1);
    }
</style>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const roleInputs = document.querySelectorAll('input[name="role"]');
        const specField = document.getElementById('id_specialization').closest('p');
        const licField = document.getElementById('id_license_number').closest('p');
        
        // Wrap them up visually or just toggle them
        const toggleFields = () => {
            const role = document.querySelector('input[name="role"]:checked').value;
            if(role === 'doctor') {
                specField.style.display = 'flex';
                licField.style.display = 'flex';
            } else {
                specField.style.display = 'none';
                licField.style.display = 'none';
            }
        };

        roleInputs.forEach(input => input.addEventListener('change', toggleFields));
        toggleFields(); // initial run
    });
</script>
{% endblock %}
